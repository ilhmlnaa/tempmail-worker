name = "tempmail-worker"
compatibility_date = "2024-10-22"
main = "src/index.ts"

# ── KV binding (auto-expire emails) ──
[[kv_namespaces]]
binding = "MAIL_LITE"
id = "2ba95be2b48247e59bf172d190476f5f"

# ── Email Worker (catch-all for your domain) ──
[email]
action = "process"

[vars]
AUTH_SECRET = "change-me-to-random-string"

[observability]
enabled = true
head_sampling_rate = 1
