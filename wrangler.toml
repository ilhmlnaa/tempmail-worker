name = "tempmail-worker"
compatibility_date = "2024-10-22"
main = "src/index.ts"

# ═══════════════════════════════════════════════════════════
#  BINDINGS — di Cloudflare Dashboard:
#    Workers & Pages → tempmail-worker → Settings → Bindings
#
#  1. D1: Variable name=DB, D1 database=tempmail-db
#     (create D1 first: npx wrangler d1 create tempmail-db)
#
#  2. Email Worker:
#     Workers & Pages → tempmail-worker → Settings → Email
#     → Enable email processing
#
#  3. Email Routing: Dashboard → domain → Catch-all → Worker
# ═══════════════════════════════════════════════════════════

[observability]
enabled = true
head_sampling_rate = 1

[vars]
AUTH_SECRET = "change-me-to-random-string"
MAIL_DOMAINS = "zenime.online,devnet.my.id"
